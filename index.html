<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Wochenplaner</title>
<meta name="theme-color" content="#fbf8f2">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Planer">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Plus+Jakarta+Sans:wght@300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div class="orbs" aria-hidden="true"></div>

  <header class="island">
    <div class="island-row">
      <div class="brand">
        <span class="eyebrow">Planer</span>
        <h1>Wochenplaner</h1>
      </div>

      <div class="nav-controls">
        <button id="prevWeek" class="pill-btn icon-only" title="Vorherige Woche">
          <svg viewBox="0 0 16 16" fill="none"><path d="M10 3 5 8l5 5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="week-label">
          <span id="weekRange">–</span>
          <span id="weekNumber" class="week-number"></span>
        </div>
        <button id="nextWeek" class="pill-btn icon-only" title="Nächste Woche">
          <svg viewBox="0 0 16 16" fill="none"><path d="m6 3 5 5-5 5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>

      <div class="actions">
        <button id="todayBtn" class="pill-btn">Heute</button>
        <button id="copyPrevBtn" class="pill-btn cta" title="Offene Aufgaben der Vorwoche übernehmen">
          <span>Vorwoche übernehmen</span>
          <span class="cta-icon">
            <svg viewBox="0 0 16 16" fill="none"><path d="M3 8a5 5 0 1 1 1.5 3.6M3 12V8.8h3.2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
        </button>
        <button id="famBtn" class="pill-btn" title="Familienmitglieder verwalten">
          <svg viewBox="0 0 16 16" fill="none"><circle cx="6" cy="5.5" r="2.3" stroke="currentColor" stroke-width="1.1"/><path d="M2 13c.4-2.3 2-3.5 4-3.5s3.6 1.2 4 3.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/><circle cx="11.5" cy="6" r="1.8" stroke="currentColor" stroke-width="1.1"/><path d="M11 9.6c1.7.1 2.8 1.1 3.1 2.9" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
          <span>Familie</span>
        </button>
        <button id="privacyBtn" class="pill-btn icon-only" title="Private Aufgaben ausblenden">
          <svg class="ico-eye" viewBox="0 0 16 16" fill="none"><path d="M1.5 8S4 3.8 8 3.8 14.5 8 14.5 8 12 12.2 8 12.2 1.5 8 1.5 8Z" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.1"/></svg>
          <svg class="ico-eye-off" viewBox="0 0 16 16" fill="none"><path d="M1.5 8S4 3.8 8 3.8c1 0 1.9.3 2.7.7M14.5 8s-2.5 4.2-6.5 4.2c-1 0-1.9-.3-2.7-.7M2.5 13.5l11-11" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button id="themeBtn" class="pill-btn icon-only" title="Design wechseln">
          <svg class="ico-sun" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3.2" stroke="currentColor" stroke-width="1.1"/><path d="M8 1.2v1.6M8 13.2v1.6M1.2 8h1.6M13.2 8h1.6M3.2 3.2l1.1 1.1M11.7 11.7l1.1 1.1M12.8 3.2l-1.1 1.1M4.3 11.7l-1.1 1.1" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
          <svg class="ico-moon" viewBox="0 0 16 16" fill="none"><path d="M13.5 9.5A6 6 0 0 1 6.5 2.5a6 6 0 1 0 7 7Z" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>

    <div class="statsbar">
      <span id="statsText" class="stats-text">0 von 0 erledigt</span>
      <div class="stats-track"><div id="statsFill" class="stats-fill"></div></div>
      <span id="statsPct" class="stats-pct">0%</span>
    </div>

    <div id="memberStats" class="member-stats" hidden></div>
  </header>

  <div id="famModal" class="modal-overlay" hidden>
    <div class="modal">
      <header class="modal-head">
        <div>
          <span class="eyebrow">Familie</span>
          <h2>Mitglieder</h2>
        </div>
        <button id="famClose" class="pill-btn icon-only" title="Schließen">
          <svg viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        </button>
      </header>
      <ul id="memberList" class="member-list"></ul>
      <form id="memberForm" class="member-form">
        <input id="memberName" type="text" placeholder="Name, z. B. Mama…" autocomplete="off" maxlength="20">
        <button type="submit" class="add-btn" title="Mitglied hinzufügen">
          <svg viewBox="0 0 16 16" fill="none"><path d="M8 3.5v9M3.5 8h9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        </button>
      </form>
      <p class="modal-hint">Tippe bei einer Aufgabe auf den runden Kreis, um festzulegen, wer sie übernimmt. Ein „?" bedeutet: noch offen — wer zuerst tippt, übernimmt.</p>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <nav id="dayStrip" class="day-strip" hidden aria-label="Tag wählen"></nav>

  <main id="board" class="board"></main>

  <template id="dayTemplate">
    <section class="day-col">
      <div class="day-inner">
        <header class="day-head">
          <div>
            <div class="day-name"></div>
            <div class="day-date"></div>
          </div>
          <div class="day-progress"><span class="progress-count">0/0</span></div>
        </header>
        <ul class="task-list"></ul>
        <form class="add-form">
          <input type="text" class="add-input" placeholder="Neue Aufgabe…" autocomplete="off">
          <div class="assign-row">
            <div class="assign-chips"></div>
            <button type="button" class="lock-btn" title="Als privat markieren">
              <svg viewBox="0 0 16 16" fill="none"><rect x="3.5" y="7" width="9" height="6" rx="1.5" stroke="currentColor" stroke-width="1.1"/><path d="M5.5 7V5.5a2.5 2.5 0 0 1 5 0V7" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
            </button>
          </div>
          <div class="add-row">
            <input type="time" class="add-time" title="Uhrzeit (optional)">
            <button type="button" class="prio-btn" data-p="none" title="Priorität wählen"><span class="prio-dot"></span></button>
            <button type="submit" class="add-btn" title="Hinzufügen">
              <svg viewBox="0 0 16 16" fill="none"><path d="M8 3.5v9M3.5 8h9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            </button>
          </div>
        </form>
      </div>
    </section>
  </template>

  <template id="taskTemplate">
    <li class="task" draggable="true">
      <label class="task-main">
        <input type="checkbox" class="task-check">
        <span class="checkmark">
          <svg viewBox="0 0 12 10" fill="none"><polyline points="1.5 5.5 4.5 8.5 10.5 1.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
        <span class="task-body">
          <span class="task-text"></span>
          <span class="task-meta">
            <button type="button" class="task-assign" title="Wer übernimmt das?">?</button>
            <span class="task-prio"></span>
            <span class="task-time"></span>
            <svg class="task-lock" viewBox="0 0 16 16" fill="none" aria-label="Privat"><rect x="3.5" y="7" width="9" height="6" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M5.5 7V5.5a2.5 2.5 0 0 1 5 0V7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          </span>
        </span>
      </label>
      <button class="task-del" title="Löschen">
        <svg viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      </button>
    </li>
  </template>

  <script src="app.js"></script>
</body>
</html>
